name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-unit:
    name: Lint + Vitest
    runs-on: ubuntu-latest
    env:
      # supabaseClient.js instancia createClient() a nivel de módulo — algunos
      # archivos importados por los tests unitarios (ej. pedidoPrint.js) lo
      # arrastran de paso aunque los tests nunca llamen a Supabase. Valores
      # dummy (no secrets reales): estos tests nunca hacen red.
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # No bloqueante: el proyecto arrastra ~186 problemas de lint preexistentes
      # (no-unused-vars, no-empty, etc. — ver Bloque 1.6 en PLAN-EJECUCION-2026-07.md,
      # deuda cosmética documentada, fuera de ese barrido). Corre igual para que el
      # resumen de CI muestre la cuenta, pero no puede tumbar el job hasta que se
      # limpie esa deuda (Bloque 5) o se adopte un baseline de lint.
      - run: npm run lint
        continue-on-error: true
      - run: npm run test

  e2e-smoke:
    name: Playwright smoke
    # Requiere los GitHub Secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
    # (públicos, ver .env.example), E2E_USER/E2E_PASSWORD (cuenta de prueba
    # dedicada, NUNCA credenciales reales de producción — ver
    # PLAN-EJECUCION-2026-07.md, Bloque 2). Opcional: E2E_CARNE_CODE.
    # Si estos secrets no están configurados todavía, este job falla —
    # es intencional (visibilidad de que falta setup), no un skip silencioso.
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_CARNE_CODE: ${{ secrets.E2E_CARNE_CODE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e/smoke.spec.js
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
