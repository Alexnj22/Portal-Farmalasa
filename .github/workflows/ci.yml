name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-unit:
    name: Lint + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  e2e-smoke:
    name: Playwright smoke
    # Requiere los GitHub Secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
    # (públicos, ver .env.example), E2E_USER/E2E_PASSWORD (cuenta de prueba
    # dedicada, NUNCA credenciales reales de producción — ver
    # PLAN-EJECUCION-2026-07.md, Bloque 2). Opcional: E2E_CARNE_CODE.
    # Si estos secrets no están configurados todavía, este job falla —
    # es intencional (visibilidad de que falta setup), no un skip silencioso.
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      E2E_USER: ${{ secrets.E2E_USER }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_CARNE_CODE: ${{ secrets.E2E_CARNE_CODE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e/smoke.spec.js
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
