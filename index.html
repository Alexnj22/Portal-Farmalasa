<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/LogoFLS.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#ddeeff" />

    <title>Portal - FarmaSalud</title>

    <style>
      /* Only pre-React splash styles — nothing here persists to affect the app */
      body, html { margin: 0; padding: 0; background-color: #E6F0FF; }

      /* ── Ambient orbs ── */
      #app-loader {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: linear-gradient(135deg, #ddeeff 0%, #f0f6ff 50%, #e8eeff 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        box-sizing: border-box;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .orb-1 {
        width: 60vw; height: 60vw;
        background: rgba(0, 82, 204, 0.22);
        top: -15%; left: -15%;
        animation: drift1 8s ease-in-out infinite alternate;
      }
      .orb-2 {
        width: 50vw; height: 50vw;
        background: rgba(105, 41, 196, 0.18);
        top: 5%; right: -15%;
        animation: drift2 10s ease-in-out infinite alternate;
      }
      .orb-3 {
        width: 65vw; height: 65vw;
        background: rgba(18, 183, 106, 0.12);
        bottom: -25%; left: 15%;
        animation: drift1 12s ease-in-out 3s infinite alternate;
      }

      @keyframes drift1 {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(4%, 5%) scale(1.08); }
      }
      @keyframes drift2 {
        0%   { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-5%, 3%) scale(1.05); }
      }

      /* ── Glass card ── */
      .glass-card {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        padding: 48px 56px;
        background: rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1.5px solid rgba(255, 255, 255, 0.72);
        border-radius: 40px;
        box-shadow:
          0 32px 80px rgba(0, 82, 204, 0.10),
          0 8px 32px rgba(0, 0, 0, 0.04),
          inset 0 2px 24px rgba(255, 255, 255, 0.85);
        animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        min-width: 280px;
      }

      /* Shimmer lines */
      .glass-card::before {
        content: '';
        position: absolute;
        top: 0; left: 40px; right: 40px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
        border-radius: 1px;
      }
      .glass-card::after {
        content: '';
        position: absolute;
        bottom: 0; left: 40px; right: 40px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0,82,204,0.25), transparent);
        border-radius: 1px;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: scale(0.92) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }

      /* ── Logo + rings ── */
      .logo-wrap {
        position: relative;
        width: 112px;
        height: 112px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }

      /* Outer ring — blue, slow CW */
      .ring-outer {
        animation: spinCW 4s linear infinite;
      }
      .ring-outer svg { width: 100%; height: 100%; }

      /* Inner ring — purple, faster CCW */
      .ring-inner {
        inset: 8px;
        animation: spinCCW 1.8s linear infinite;
      }
      .ring-inner svg { width: 100%; height: 100%; }

      @keyframes spinCW  { to { transform: rotate(360deg); } }
      @keyframes spinCCW { to { transform: rotate(-360deg); } }

      /* Logo pill */
      .logo-pill {
        position: relative;
        z-index: 2;
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(145deg, #0052CC, #003D99);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 8px 28px rgba(0, 82, 204, 0.42),
          inset 0 1px 2px rgba(255,255,255,0.25);
      }
      .logo-pill img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      /* ── Brand text ── */
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .brand-name {
        font-size: 21px;
        font-weight: 900;
        color: #1e293b;
        letter-spacing: -0.5px;
        line-height: 1;
      }
      .brand-sub {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: rgba(0, 82, 204, 0.60);
      }

      /* ── Bounce dots ── */
      .dots {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(0, 82, 204, 0.40);
        animation: bounce 0.9s ease-in-out infinite;
      }
      .dot:nth-child(1) { animation-delay: 0s; }
      .dot:nth-child(2) { animation-delay: 0.14s; }
      .dot:nth-child(3) { animation-delay: 0.28s; }
      .dot:nth-child(4) { animation-delay: 0.42s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40%            { transform: translateY(-6px); opacity: 1; }
      }

      /* ── Status label ── */
      .status {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.20em;
        color: #94a3b8;
        margin-top: -8px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">

        <!-- Ambient orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Glass card -->
        <div class="glass-card">

          <!-- Logo + spinning rings -->
          <div class="logo-wrap">
            <!-- Outer ring (blue, CW) -->
            <div class="ring ring-outer">
              <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   stop-color="#0052CC" stop-opacity="0.75"/>
                    <stop offset="60%"  stop-color="#0052CC" stop-opacity="0.15"/>
                    <stop offset="100%" stop-color="#0052CC" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="46" stroke="url(#rg1)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="160 130"/>
              </svg>
            </div>
            <!-- Inner ring (purple, CCW) -->
            <div class="ring ring-inner">
              <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%"   stop-color="#6929C4" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#6929C4" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="44" stroke="url(#rg2)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="80 200"/>
              </svg>
            </div>
            <!-- Logo -->
            <div class="logo-pill">
              <img src="/LogoFLS.svg" alt="Farmalasa" />
            </div>
          </div>

          <!-- Brand -->
          <div class="brand">
            <span class="brand-name">Portal Farmalasa</span>
            <span class="brand-sub">Sistema de Gestión</span>
          </div>

          <!-- Dots -->
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>

          <!-- Status -->
          <span class="status">Iniciando Portal...</span>

        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
