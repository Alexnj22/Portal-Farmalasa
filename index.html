<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo192.png" />
    <link rel="apple-touch-icon" href="/Logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" as="image" href="/Logo192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <script>
      // Bloque 5.7b: user-scalable=no da "feel de app nativa" pero bloquea
      // pinch-zoom por completo — tensión real con WCAG 1.4.4 (Resize Text)
      // para quien navega el portal como página web normal en el navegador.
      // Decisión: bloquear zoom SOLO donde tiene sentido de app fija —
      // build nativo (Capacitor), PWA ya instalada (display-mode:
      // standalone / navigator.standalone en iOS), o /kiosk (tablet
      // montada en sucursal, uso público sin usuario logueado). En
      // cualquier otro caso (pestaña de navegador normal, aunque sea en
      // el celular) se permite pinch-zoom real. Corre inline y sincrónico
      // antes de que React monte, para no producir un parpadeo de
      // comportamiento de zoom distinto tras la carga.
      (function () {
        var isKiosk = location.pathname.indexOf('/kiosk') === 0;
        var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
        if (!isKiosk && !isNative && !isStandalone) {
          var vp = document.querySelector('meta[name="viewport"]');
          if (vp) vp.setAttribute('content', 'width=device-width, initial-scale=1.0, viewport-fit=cover');
        }
      })();
    </script>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" (NO black-translucent): iOS RESERVA la franja del status
         bar y el contenido standalone nunca queda debajo de la isla dinámica.
         Con black-translucent el contenido se extiende bajo el status bar y
         depende de env(safe-area-inset-top) para despejarlo — pero iOS 26
         devuelve 0 a ratos en standalone (regresión conocida, reportada por
         el usuario 2026-07-23: la hamburguesa quedaba tapada). El padding
         env() del header móvil se queda como respaldo: si iOS sí extiende el
         contenido, empuja; si no, colapsa a 0. Funciona en ambos mundos. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Coincide con el fondo del header móvil (rgba(226,222,252)) para que
         la franja del status bar se funda con él en standalone y Safari. -->
    <meta name="theme-color" content="#e2defc" />

    <script>
      // PWA standalone iOS: al reabrir la app "agregada a inicio", iOS
      // RESUME la sesión suspendida en vez de recargar — puede vivir días
      // con bundle y datos viejos, sin botón de refresh (comprobado
      // 2026-07-23: la PWA del usuario mostraba datos del día anterior y
      // código de 4 deploys atrás — ningún fix "llegaba" al standalone).
      // Si la página estuvo oculta >30 min, recargar al volver a primer
      // plano. Solo en standalone/nativo: en navegador normal existe
      // refresh manual y recargar pestañas de fondo perdería trabajo.
      (function () {
        var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
        var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        if (!isStandalone && !isNative) return;
        var MAX_HIDDEN_MS = 30 * 60 * 1000;
        var hiddenAt = null;
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') { hiddenAt = Date.now(); return; }
          if (hiddenAt && Date.now() - hiddenAt > MAX_HIDDEN_MS && navigator.onLine !== false) {
            location.reload();
            return;
          }
          hiddenAt = null;
        });
      })();
    </script>

    <title>Portal - FarmaSalud</title>

    <style>
      /* body/html: persisten tras montar React. El color DEBE coincidir con el
         bg del shell autenticado (#E6F0FF, App.jsx): es lo que Safari iOS deja
         traslucir detrás de su barra inferior y lo que asoma en overscroll. */
      body, html { background-color: #E6F0FF; margin: 0; padding: 0; }

      /* ─── Everything below is scoped to #app-loader which React removes on mount ─── */

      #app-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        overflow: hidden;
        background: radial-gradient(ellipse at 38% 28%, #e2daff 0%, #eae8ff 22%, #eef2ff 50%, #f3f4fb 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }

      /* ── Ambient orbs ── */
      #app-loader .orb { position: absolute; border-radius: 50%; pointer-events: none; }

      #app-loader .orb-1 {
        width: 85vw; height: 85vw; top: -35%; left: -22%;
        background: radial-gradient(circle, rgba(110,70,230,0.24) 0%, transparent 68%);
        filter: blur(65px);
        animation: fls-orb1 11s ease-in-out infinite alternate;
      }
      #app-loader .orb-2 {
        width: 70vw; height: 70vw; top: 0%; right: -28%;
        background: radial-gradient(circle, rgba(60,100,240,0.18) 0%, transparent 68%);
        filter: blur(65px);
        animation: fls-orb2 13s ease-in-out infinite alternate;
      }
      #app-loader .orb-3 {
        width: 90vw; height: 90vw; bottom: -45%; left: 0%;
        background: radial-gradient(circle, rgba(150,90,240,0.18) 0%, transparent 68%);
        filter: blur(75px);
        animation: fls-orb1 16s ease-in-out 2s infinite alternate;
      }
      #app-loader .orb-4 {
        width: 50vw; height: 50vw; top: 30%; left: 60%;
        background: radial-gradient(circle, rgba(90,150,255,0.14) 0%, transparent 68%);
        filter: blur(55px);
        animation: fls-orb2 9s ease-in-out 1s infinite alternate;
      }
      #app-loader .orb-5 {
        width: 35vw; height: 35vw; top: 55%; left: 35%;
        background: radial-gradient(circle, rgba(200,130,255,0.12) 0%, transparent 68%);
        filter: blur(45px);
        animation: fls-orb1 7s ease-in-out 3s infinite alternate;
      }
      @keyframes fls-orb1 {
        0%   { transform: translate(0,0) scale(1);      }
        100% { transform: translate(6%,8%) scale(1.12); }
      }
      @keyframes fls-orb2 {
        0%   { transform: translate(0,0) scale(1);       }
        100% { transform: translate(-8%,5%) scale(1.08); }
      }

      /* ── Floating glass particles ── */
      #app-loader .particle {
        position: absolute; border-radius: 50%; pointer-events: none;
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.88);
        box-shadow: 0 2px 10px rgba(110,70,220,0.08), inset 0 1px 2px rgba(255,255,255,1);
      }
      #app-loader .p1  { width:17px; height:17px; top:14%; left:18%; animation: fls-f1 6.2s ease-in-out infinite; }
      #app-loader .p2  { width:10px; height:10px; top:22%; left:74%; animation: fls-f2 8.4s ease-in-out 1.1s infinite; }
      #app-loader .p3  { width:22px; height:22px; top:60%; left:14%; animation: fls-f1 7.3s ease-in-out 2.2s infinite; }
      #app-loader .p4  { width:13px; height:13px; top:68%; left:80%; animation: fls-f2 9.1s ease-in-out 0.6s infinite; }
      #app-loader .p5  { width: 8px; height: 8px;  top:40%; left: 9%; animation: fls-f1 5.2s ease-in-out 3.0s infinite; }
      #app-loader .p6  { width:15px; height:15px; top:17%; left:84%; animation: fls-f2 10.5s ease-in-out 1.7s infinite; }
      #app-loader .p7  { width: 9px; height: 9px;  top:84%; left:40%; animation: fls-f1 6.8s ease-in-out 4.1s infinite; }
      #app-loader .p8  { width:24px; height:24px; top:76%; left:65%; animation: fls-f2 11.2s ease-in-out 0.9s infinite; }
      #app-loader .p9  { width: 6px; height: 6px;  top:32%; left:90%; animation: fls-f1 7.8s ease-in-out 2.7s infinite; }
      #app-loader .p10 { width:12px; height:12px; top:90%; left:24%; animation: fls-f2 8.9s ease-in-out 3.6s infinite; }
      #app-loader .p11 { width:19px; height:19px; top: 8%; left:50%; animation: fls-f1 9.0s ease-in-out 0.3s infinite; }
      #app-loader .p12 { width: 7px; height: 7px;  top:52%; left:95%; animation: fls-f2 6.6s ease-in-out 5.0s infinite; }
      @keyframes fls-f1 {
        0%,100% { transform: translate(0,0) scale(1);           opacity:0.60; }
        30%      { transform: translate(12px,-22px) scale(1.18); opacity:1.00; }
        65%      { transform: translate(-7px,-9px) scale(0.88);  opacity:0.75; }
      }
      @keyframes fls-f2 {
        0%,100% { transform: translate(0,0) scale(1);            opacity:0.50; }
        40%      { transform: translate(-14px,18px) scale(1.22);  opacity:0.90; }
        72%      { transform: translate(9px,-12px) scale(0.82);   opacity:0.70; }
      }

      /* ── Ripple rings (behind blob, centered) ── */
      #app-loader .ripple-wrap {
        position: absolute; top: 50%; left: 50%;
        width: 160px; height: 160px;
        margin-top: -80px; margin-left: -80px;
        pointer-events: none;
      }
      #app-loader .ripple {
        position: absolute; inset: 0; border-radius: 50%;
        border: 1.5px solid rgba(110,70,220,0.22);
        animation: fls-ripple 3.8s ease-out infinite;
      }
      #app-loader .ripple:nth-child(2) { animation-delay: 1.27s; }
      #app-loader .ripple:nth-child(3) { animation-delay: 2.53s; }
      @keyframes fls-ripple {
        0%   { transform: scale(1);   opacity: 0.75; }
        100% { transform: scale(3.2); opacity: 0;    }
      }

      /* ── Spinning arc rings (centered via margin trick) ── */
      #app-loader .arc {
        position: absolute; top: 50%; left: 50%;
        pointer-events: none;
      }
      #app-loader .arc-1 {
        width: 216px; height: 216px;
        margin-top: -108px; margin-left: -108px;
        animation: fls-cw 9s linear infinite;
      }
      #app-loader .arc-2 {
        width: 258px; height: 258px;
        margin-top: -129px; margin-left: -129px;
        animation: fls-ccw 14s linear infinite;
      }
      #app-loader .arc-3 {
        width: 186px; height: 186px;
        margin-top: -93px; margin-left: -93px;
        animation: fls-cw 5.5s linear infinite;
      }
      #app-loader .arc-4 {
        width: 290px; height: 290px;
        margin-top: -145px; margin-left: -145px;
        animation: fls-ccw 20s linear infinite;
      }
      #app-loader .arc svg { width: 100%; height: 100%; display: block; }
      @keyframes fls-cw  { to { transform: rotate(360deg);  } }
      @keyframes fls-ccw { to { transform: rotate(-360deg); } }

      /* ── Morphing liquid glass blob ── */
      #app-loader .blob {
        position: relative; z-index: 10;
        width: 158px; height: 158px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.44);
        backdrop-filter: blur(44px) saturate(210%);
        -webkit-backdrop-filter: blur(44px) saturate(210%);
        border: 2px solid rgba(255,255,255,0.82);
        border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        box-shadow:
          0 22px 72px rgba(110,70,220,0.18),
          0 8px 28px rgba(0,0,0,0.05),
          inset 0 2px 28px rgba(255,255,255,0.94),
          inset 0 -4px 16px rgba(110,70,220,0.07);
        animation:
          fls-morph 9s ease-in-out infinite,
          fls-blob-drift 7s ease-in-out infinite alternate,
          fls-blob-in 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      /* rotating inner shimmer */
      #app-loader .blob::before {
        content: ''; position: absolute; inset: 0; border-radius: inherit;
        background: linear-gradient(128deg,
          rgba(255,255,255,0.70) 0%,
          rgba(255,255,255,0.08) 48%,
          rgba(110,70,220,0.05) 100%
        );
        animation: fls-shimmer-rot 6.5s linear infinite;
        pointer-events: none;
      }
      /* specular edge glint */
      #app-loader .blob::after {
        content: ''; position: absolute;
        top: 10px; left: 20px; right: 20px; height: 2px;
        border-radius: 99px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.90), transparent);
        pointer-events: none;
      }
      @keyframes fls-morph {
        0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        18%      { border-radius: 38% 62% 58% 42% / 52% 58% 42% 58%; }
        36%      { border-radius: 28% 72% 62% 38% / 72% 38% 62% 28%; }
        54%      { border-radius: 58% 42% 38% 62% / 32% 68% 32% 68%; }
        72%      { border-radius: 42% 58% 72% 28% / 58% 42% 58% 42%; }
        88%      { border-radius: 50% 50% 44% 56% / 44% 56% 44% 56%; }
      }
      @keyframes fls-blob-drift {
        0%   { transform: translateY(0px); }
        100% { transform: translateY(-14px); }
      }
      @keyframes fls-blob-in {
        from { opacity: 0; transform: scale(0.65); }
        to   { opacity: 1; transform: scale(1);    }
      }
      @keyframes fls-shimmer-rot {
        to { transform: rotate(360deg); }
      }

      /* ── Glass logo pill (no solid color) ── */
      #app-loader .logo-pill {
        position: relative; z-index: 2;
        width: 78px; height: 78px; border-radius: 26px;
        background: rgba(255,255,255,0.68);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 2px solid rgba(255,255,255,0.95);
        display: flex; align-items: center; justify-content: center;
        box-shadow:
          0 8px 32px rgba(110,70,220,0.14),
          0 2px 8px rgba(0,0,0,0.04),
          inset 0 2px 6px rgba(255,255,255,1);
        animation: fls-logo-pulse 4.2s ease-in-out infinite;
        overflow: hidden;
      }
      /* Placeholder shown while SVG loads */
      #app-loader .logo-placeholder {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 900; letter-spacing: -1px;
        background: linear-gradient(135deg, rgba(110,70,220,0.18) 0%, rgba(80,120,255,0.12) 100%);
        color: rgba(110,70,200,0.5);
        border-radius: inherit;
        transition: opacity 0.3s;
      }
      #app-loader .logo-pill img {
        width: 48px; height: 48px; object-fit: contain;
        position: relative; z-index: 1;
        opacity: 0; transition: opacity 0.35s ease;
      }
      #app-loader .logo-pill img.loaded { opacity: 1; }
      #app-loader .logo-pill img.loaded ~ .logo-placeholder { opacity: 0; }
      @keyframes fls-logo-pulse {
        0%,100% { transform: scale(1);    box-shadow: 0 8px 32px rgba(110,70,220,0.14), 0 2px 8px rgba(0,0,0,0.04), inset 0 2px 6px rgba(255,255,255,1); }
        50%      { transform: scale(1.05); box-shadow: 0 14px 48px rgba(110,70,220,0.26), 0 2px 8px rgba(0,0,0,0.04), inset 0 2px 6px rgba(255,255,255,1); }
      }

      /* ── Brand text ── */
      #app-loader .brand {
        position: relative; z-index: 10;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        margin-top: 30px;
        animation: fls-fade-up 1s cubic-bezier(0.22,1,0.36,1) 0.35s both;
      }
      #app-loader .brand-name {
        font-size: 22px; font-weight: 900; color: #1e293b; letter-spacing: -0.5px; line-height: 1;
      }
      #app-loader .brand-sub {
        font-size: 10px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.25em; color: rgba(110,70,200,0.52);
      }
      @keyframes fls-fade-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      /* ── Liquid shimmer progress bar ── */
      #app-loader .progress-wrap {
        position: relative; z-index: 10;
        margin-top: 26px; width: 164px; height: 4px;
        border-radius: 99px; background: rgba(110,70,220,0.10); overflow: hidden;
        animation: fls-fade-up 1s cubic-bezier(0.22,1,0.36,1) 0.55s both;
      }
      #app-loader .progress-bar {
        position: absolute; inset-block: 0; left: -70%; width: 70%; border-radius: 99px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(110,70,220,0.45) 30%,
          rgba(180,140,255,0.90) 58%,
          rgba(220,200,255,0.95) 75%,
          transparent 100%
        );
        animation: fls-progress 2.0s ease-in-out infinite;
      }
      @keyframes fls-progress { 0% { left: -70%; } 100% { left: 115%; } }

      /* ── Status ── */
      #app-loader .status {
        position: relative; z-index: 10;
        margin-top: 14px;
        font-size: 10px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.22em; color: #94a3b8;
        animation: fls-fade-up 1s cubic-bezier(0.22,1,0.36,1) 0.65s both;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">

        <!-- Ambient orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>

        <!-- Floating glass particles -->
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
        <div class="particle p9"></div>
        <div class="particle p10"></div>
        <div class="particle p11"></div>
        <div class="particle p12"></div>

        <!-- Ripple rings -->
        <div class="ripple-wrap">
          <div class="ripple"></div>
          <div class="ripple"></div>
          <div class="ripple"></div>
        </div>

        <!-- Spinning arc rings (4 at different sizes + speeds) -->
        <div class="arc arc-1">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%"   stop-color="#7850DC" stop-opacity="0.60"/>
                <stop offset="55%"  stop-color="#7850DC" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="#7850DC" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <circle cx="100" cy="100" r="93" stroke="url(#g1)" stroke-width="2.0" stroke-linecap="round" stroke-dasharray="140 155"/>
          </svg>
        </div>
        <div class="arc arc-2">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%"   stop-color="#4A78F0" stop-opacity="0.45"/>
                <stop offset="100%" stop-color="#4A78F0" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <circle cx="100" cy="100" r="93" stroke="url(#g2)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="75 220"/>
          </svg>
        </div>
        <div class="arc arc-3">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%"   stop-color="#A060F0" stop-opacity="0.40"/>
                <stop offset="100%" stop-color="#A060F0" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <circle cx="100" cy="100" r="93" stroke="url(#g3)" stroke-width="1.1" stroke-linecap="round" stroke-dasharray="55 240"/>
          </svg>
        </div>
        <div class="arc arc-4">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g4" x1="50%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%"   stop-color="#C080FF" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#C080FF" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <circle cx="100" cy="100" r="93" stroke="url(#g4)" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="40 255"/>
          </svg>
        </div>

        <!-- Morphing liquid glass blob with glass logo -->
        <div class="blob">
          <div class="logo-pill">
            <img src="/Logo192.png" alt="Farmalasa" width="48" height="48"
              id="loader-logo"
              onload="this.classList.add('loaded')" />
            <div class="logo-placeholder">FL</div>
          </div>
          <script>
            (function(){var i=document.getElementById('loader-logo');if(i&&i.complete&&i.naturalWidth)i.classList.add('loaded');})();
          </script>
        </div>

        <!-- Brand -->
        <div class="brand">
          <span class="brand-name">Portal Farmalasa</span>
          <span class="brand-sub">Sistema de Gestión</span>
        </div>

        <!-- Liquid shimmer progress -->
        <div class="progress-wrap">
          <div class="progress-bar"></div>
        </div>

        <span class="status">Iniciando Portal...</span>

      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
