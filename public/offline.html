<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Sin conexión — Portal Farmalasa</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(circle at 15% -10%, rgba(110,70,230,0.28) 0%, transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(60,100,240,0.22) 0%, transparent 45%),
      radial-gradient(circle at -10% 110%, rgba(150,80,240,0.20) 0%, transparent 45%),
      #eef1f8;
  }
  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
    padding: 40px 32px;
    border-radius: 2.5rem;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 30px 80px rgba(0,0,0,0.15), inset 0 2px 15px rgba(255,255,255,0.8);
  }
  .icon-wrap {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    border-radius: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,82,204,0.08);
    border: 1px solid rgba(0,82,204,0.15);
  }
  .icon-wrap img { width: 40px; height: 40px; opacity: 0.85; }
  h1 {
    font-size: 18px;
    font-weight: 900;
    color: #1e293b;
    letter-spacing: -0.01em;
    margin: 0 0 8px;
  }
  p {
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    line-height: 1.6;
    margin: 0 0 28px;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 1rem;
    background: #0052CC;
    color: #fff;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,82,204,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  .hint {
    margin-top: 16px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #94a3b8;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <img src="/Logo192.png" alt="" />
    </div>
    <h1>Sin conexión</h1>
    <p>No se pudo conectar con el Portal. Revisá tu conexión a internet e intentá de nuevo.</p>
    <button onclick="location.reload()">Reintentar</button>
    <p class="hint">Farmacias La Popular y La Salud</p>
  </div>
</body>
</html>
